name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=app/upload-keystore.jks" >> android/key.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create .env file
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/SpendSmart-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/SpendSmart-${{ github.ref_name }}.apk
          generate_release_notes: true

      - name: Get Release Notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.body')
          BODY=$(echo "$BODY" | head -c 4000)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          jq -n \
            --arg content "@everyone" \
            --arg title "SpendSmart ${{ github.ref_name }} Released" \
            --arg description "${{ steps.release_notes.outputs.body }}" \
            --arg url "${{ steps.create_release.outputs.url }}" \
            --arg download "[Download APK](${{ steps.create_release.outputs.url }})" \
            --arg version "${{ github.ref_name }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)" \
            '{
              content: $content,
              embeds: [{
                title: $title,
                description: $description,
                url: $url,
                color: 3066993,
                fields: [
                  { name: "Download", value: $download, inline: true },
                  { name: "Version", value: $version, inline: true }
                ],
                timestamp: $timestamp
              }]
            }' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
